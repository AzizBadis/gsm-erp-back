services:
  postgres:
    image: postgres:16-alpine
    container_name: gps-installation-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gps_user
      POSTGRES_PASSWORD: gps_password
      POSTGRES_DB: gps_installation_erp
    ports:
      - "5544:5432"
    volumes:
      - gps_installation_erp_postgres_data:/var/lib/postgresql/data

volumes:
  gps_installation_erp_postgres_data:
